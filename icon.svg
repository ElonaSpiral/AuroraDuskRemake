<svg xmlns="http://www.w3.org/2000/svg" width="128" height="128" viewBox="0 0 128 128">
  <!-- Dark background -->
  <rect width="128" height="128" fill="#130E09" rx="16"/>
  <!-- Gear outline (large) -->
  <circle cx="64" cy="64" r="38" fill="none" stroke="#B8841F" stroke-width="5"/>
  <circle cx="64" cy="64" r="22" fill="none" stroke="#B8841F" stroke-width="3"/>
  <!-- Gear teeth approximation -->
  <rect x="60" y="20" width="8" height="12" fill="#B8841F" rx="2"/>
  <rect x="60" y="96" width="8" height="12" fill="#B8841F" rx="2"/>
  <rect x="20" y="60" width="12" height="8" fill="#B8841F" rx="2"/>
  <rect x="96" y="60" width="12" height="8" fill="#B8841F" rx="2"/>
  <rect x="33" y="28" width="8" height="12" fill="#B8841F" rx="2" transform="rotate(45 37 34)"/>
  <rect x="87" y="28" width="8" height="12" fill="#B8841F" rx="2" transform="rotate(-45 91 34)"/>
  <rect x="33" y="88" width="8" height="12" fill="#B8841F" rx="2" transform="rotate(-45 37 94)"/>
  <rect x="87" y="88" width="8" height="12" fill="#B8841F" rx="2" transform="rotate(45 91 94)"/>
  <!-- Steam puff -->
  <ellipse cx="64" cy="56" rx="6" ry="4" fill="#D8CFC0" opacity="0.5"/>
  <ellipse cx="58" cy="50" rx="4" ry="3" fill="#D8CFC0" opacity="0.35"/>
  <ellipse cx="70" cy="48" rx="5" ry="3.5" fill="#D8CFC0" opacity="0.3"/>
  <!-- "A" letter -->
  <text x="64" y="72" font-family="serif" font-size="26" font-weight="bold"
        text-anchor="middle" fill="#E8D9B0">A</text>
</svg>
